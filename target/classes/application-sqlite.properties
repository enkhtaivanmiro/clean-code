# SQLite Configuration for Branch Server
spring.datasource.url=jdbc:sqlite:pos_branch.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate 6 settings for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Critical fixes for SQLite/Hibernate 6 metadata errors
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=legacy
spring.jpa.properties.hibernate.metadata.extract_sequences=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Thread Pool for Sync (same as default)
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=25
spring.task.execution.pool.queue-capacity=50
